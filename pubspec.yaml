name: zjulife
description: ZJU Campus Life Assistant - 浙大生活助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # HTTP & Networking
  dio: ^5.4.0
  html: ^0.15.4

  # WebView for CAS Authentication
  webview_flutter: ^4.4.2

  # Encryption
  pointycastle: ^3.7.3
  asn1lib: ^1.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Date & Time
  intl: any
  
  # Navigation
  go_router: ^14.0.0
  
  # URL Launcher
  url_launcher: ^6.2.1
  web: ^1.1.1

  # Icons
  lucide_icons_flutter: ^3.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  # 暂时注释掉自定义字体，使用系统默认字体
  # 如需使用自定义字体，请下载 Noto Serif SC 和 Noto Sans SC 字体
  # 放入 assets/fonts/ 目录后取消注释
  # fonts:
  #   - family: NotoSerifSC
  #     fonts:
  #       - asset: assets/fonts/NotoSerifSC-Regular.otf
  #       - asset: assets/fonts/NotoSerifSC-Bold.otf
  #         weight: 700
  #   - family: NotoSansSC
  #     fonts:
  #       - asset: assets/fonts/NotoSansSC-Regular.otf
  #       - asset: assets/fonts/NotoSansSC-Medium.otf
  #         weight: 500
  #       - asset: assets/fonts/NotoSansSC-Bold.otf
  #         weight: 700

  # assets:
  #   - assets/images/
  #   - assets/icons/
